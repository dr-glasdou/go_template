version: "2"

linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - revive
    - cyclop
    - funlen
    - gosec
    - wsl_v5

  settings:
    cyclop:
      max-complexity: 10
    funlen:
      lines: 60
      statements: 40
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2

  exclusions:
    rules:
      - path: '.*\.test\.go'
        linters:
          - funlen
          - gosec

formatters:
  enable:
    - gci
    - goimports

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(glasdou.wtf/gotemplate)
    goimports:
      local-prefixes: [glasdou.wtf/gotemplate]
